<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>The Neural Trials</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Consolas', monospace; background-color: #0a0e17; color: #c9d1d9; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .panel-izquierdo { width: 20%; background: #111827; padding: 25px; border-right: 2px solid #1f2937; display: flex; flex-direction: column; gap: 15px; z-index: 10; overflow-y: auto;}
        .panel-derecho { width: 80%; padding: 40px; display: flex; flex-direction: column; align-items: center; overflow-y: auto; background: radial-gradient(circle at top, #162032, #0a0e17); }

        h2 { color: #3b82f6; text-transform: uppercase; letter-spacing: 3px; border-bottom: 2px solid #10b981; padding-bottom: 10px; text-align: center; margin-top: 0; width: 100%;}
        #nombre-seleccionado { color: #10b981; margin-top: 20px; border-bottom: none;}

        .competidor-btn { width: 100%; padding: 15px; background: #1f2937; color: #9ca3af; border: 1px solid #374151; border-radius: 8px; cursor: pointer; text-align: center; font-size: 16px; font-weight: bold; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .competidor-btn:hover { background: #374151; color: white; transform: translateX(5px); }
        .competidor-btn.activo { background: #3b82f6; color: white; border-color: #60a5fa; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }

        .podio-container { display: flex; gap: 30px; margin-bottom: 40px; width: 100%; justify-content: center; align-items: flex-end; }
        .podio-card { background: #1f2937; padding: 20px; border-radius: 12px; text-align: center; width: 180px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border-top: 6px solid; transition: 0.3s; }
        .podio-card:hover { transform: translateY(-5px); }
        .oro { border-top-color: #fbbf24; height: 150px; background: linear-gradient(180deg, rgba(251,191,36,0.1) 0%, rgba(31,41,55,1) 100%); }
        .plata { border-top-color: #9ca3af; height: 130px; }
        .bronce { border-top-color: #b45309; height: 110px; }
        .podio-card h3 { margin: 5px 0; color: white; font-size: 20px; }
        .podio-card p { font-size: 14px; font-weight: bold; text-transform: uppercase; margin: 10px 0; }
        .oro p { color: #fbbf24; } .plata p { color: #9ca3af; } .bronce p { color: #b45309; }

        .chart-container { width: 350px; height: 350px; margin-bottom: 40px; background: #111827; padding: 25px; border-radius: 50%; box-shadow: 0 0 40px rgba(16, 185, 129, 0.1); border: 2px solid #1f2937; }

        .inputs-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; width: 80%; background: #111827; padding: 30px; border-radius: 12px; border: 1px solid #1f2937; margin-bottom: 30px; }
        .inputs-grid label { display: flex; flex-direction: column; align-items: center; color: #9ca3af; font-size: 14px; font-weight: bold; text-align: center; }
        .inputs-grid input { width: 70px; padding: 10px; margin-top: 8px; background: #0a0e17; color: #10b981; border: 1px solid #374151; border-radius: 6px; text-align: center; font-size: 18px; font-weight: bold; font-family: 'Consolas', monospace; }
        .inputs-grid input:focus { outline: none; border-color: #10b981; box-shadow: 0 0 10px rgba(16, 185, 129, 0.3); }

        .btn-guardar { padding: 15px 50px; background: #10b981; color: #0a0e17; border: none; cursor: pointer; font-size: 18px; font-weight: bold; border-radius: 8px; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; margin-bottom: 30px;}
        .btn-guardar:hover { background: #34d399; box-shadow: 0 0 20px rgba(16, 185, 129, 0.6); transform: scale(1.05); }
    </style>
</head>
<body>

<div class="panel-izquierdo" id="lista-competidores">
    <h2>Competidores</h2>
</div>

<div class="panel-derecho">
    <div class="podio-container" id="podio">
    </div>

    <h2 id="nombre-seleccionado">Selecciona un competidor</h2>
    <div class="chart-container">
        <canvas id="miGrafica"></canvas>
    </div>

    <div class="inputs-grid" id="formulario" style="display: none;">
        <label>Computo en la Nube [%] <input type="number" id="p1" min="0" max="100"></label>
        <label>Reconocimiento de Patrones-Sintactico estructural [%] <input type="number" id="p2" min="0" max="100"></label>
        <label>Microcontroladores [%] <input type="number" id="p3" min="0" max="100"></label>
        <label>Arboles de decision [%] <input type="number" id="p4" min="0" max="100"></label>
        <label>Compiladores [%] <input type="number" id="p5" min="0" max="100"></label>
        <label>Ingenieria de Software [%] <input type="number" id="p6" min="0" max="100"></label>
        <label>Mineria de Datos [%] <input type="number" id="p7" min="0" max="100"></label>
        <label>Progreso Personal [%] <input type="number" id="p8" min="0" max="100"></label>
    </div>
    <button class="btn-guardar" id="btnGuardar" style="display: none;" onclick="guardarDatos()">Actualizar Métricas</button>
</div>

<script>
    let competidores = [];
    let seleccionadoId = null;
    let graficaPie = null;

    async function cargarDatos() {
        const respuesta = await fetch('/api/competidores/ranking');
        competidores = await respuesta.json();
        dibujarInterfaz();
    }

    function dibujarInterfaz() {
        const lista = document.getElementById('lista-competidores');
        const podio = document.getElementById('podio');
        lista.innerHTML = '<h2>Competidores</h2>';
        podio.innerHTML = '';

        const medallas = ['oro', 'plata', 'bronce'];
        const rangos = ['Dominando', 'En Batalla', 'Crítico'];

        competidores.forEach((c, index) => {
            if(index < 3) {
                podio.innerHTML += `
                    <div class="podio-card ${medallas[index]}">
                        <h3>#${index + 1} ${c.nombre}</h3>
                        <p>${rangos[index]}</p>
                        <small style="color: white; font-weight: bold;">Rendimiento: ${c.promedio.toFixed(1)}%</small>
                    </div>
                `;
            }

            const btn = document.createElement('button');
            btn.className = `competidor-btn ${c.id === seleccionadoId ? 'activo' : ''}`;
            btn.innerText = c.nombre;
            btn.onclick = () => seleccionarCompetidor(c.id);
            lista.appendChild(btn);
        });
    }

    function seleccionarCompetidor(id) {
        seleccionadoId = id;
        const c = competidores.find(x => x.id === id);

        document.getElementById('nombre-seleccionado').innerText = "MÉTRICAS NEURALES: " + c.nombre;
        document.getElementById('formulario').style.display = 'grid';
        document.getElementById('btnGuardar').style.display = 'block';

        for(let i=1; i<=8; i++) document.getElementById('p'+i).value = c['p'+i] || 0;

        dibujarGrafica(c);
        dibujarInterfaz();
    }

    function dibujarGrafica(c) {
        const ctx = document.getElementById('miGrafica').getContext('2d');
        if (graficaPie) graficaPie.destroy();

        graficaPie = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Minería de Datos', 'Spring Boot', 'OpenCV', 'Física', 'Robótica', 'Inglés', 'Carpintería', 'Progreso Personal'],
                datasets: [{
                    data: [c.p1 || 0, c.p2 || 0, c.p3 || 0, c.p4 || 0, c.p5 || 0, c.p6 || 0, c.p7 || 0, c.p8 || 0],
                    backgroundColor: ['#ef4444', '#3b82f6', '#f59e0b', '#10b981', '#8b5cf6', '#f97316', '#64748b', '#ec4899'],
                    borderColor: '#111827',
                    borderWidth: 2
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, color: '#c9d1d9' }
        });
    }

    async function guardarDatos() {
        if(!seleccionadoId) return;

        const payload = {
            p1: parseInt(document.getElementById('p1').value) || 0,
            p2: parseInt(document.getElementById('p2').value) || 0,
            p3: parseInt(document.getElementById('p3').value) || 0,
            p4: parseInt(document.getElementById('p4').value) || 0,
            p5: parseInt(document.getElementById('p5').value) || 0,
            p6: parseInt(document.getElementById('p6').value) || 0,
            p7: parseInt(document.getElementById('p7').value) || 0,
            p8: parseInt(document.getElementById('p8').value) || 0
        };

        const response = await fetch('/api/competidores/' + seleccionadoId, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if(response.ok) {
            cargarDatos();
        } else {
            console.error("Error en la conexión con el servidor.");
        }
    }

    cargarDatos();
</script>
</body>
</html>
