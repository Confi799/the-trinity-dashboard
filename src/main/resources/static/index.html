<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>The Neural Trials</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1a1a1a; color: white; margin: 0; display: flex; height: 100vh; }
        .panel-izquierdo { width: 20%; background: #2a2a2a; padding: 20px; border-right: 2px solid #444; }
        .panel-derecho { width: 80%; padding: 20px; display: flex; flex-direction: column; align-items: center; overflow-y: auto;}

        .competidor-btn { display: block; width: 100%; padding: 15px; margin-bottom: 10px; background: #333; color: white; border: 1px solid #555; cursor: pointer; text-align: left; font-size: 16px; }
        .competidor-btn:hover { background: #555; }
        .competidor-btn.activo { background: #007bff; border-color: #0056b3; }

        .podio-container { display: flex; gap: 20px; margin-bottom: 30px; width: 100%; justify-content: center;}
        .podio-card { background: #333; padding: 15px; border-radius: 8px; text-align: center; width: 150px; border: 2px solid #555;}
        .oro { border-color: #ffd700; } .plata { border-color: #c0c0c0; } .bronce { border-color: #cd7f32; }

        .chart-container { width: 300px; height: 300px; margin-bottom: 30px; }

        .inputs-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 50%; margin-bottom: 20px;}
        .inputs-grid label { display: flex; justify-content: space-between; align-items: center; background: #333; padding: 10px; border-radius: 5px;}
        .inputs-grid input { width: 60px; padding: 5px; background: #222; color: white; border: 1px solid #555; }

        .btn-guardar { padding: 10px 20px; background: #28a745; color: white; border: none; cursor: pointer; font-size: 16px; border-radius: 5px; width: 50%;}
        .btn-guardar:hover { background: #218838; }
    </style>
</head>
<body>

<div class="panel-izquierdo" id="lista-competidores">
    <h2>Competidores</h2>
</div>

<div class="panel-derecho">
    <div class="podio-container" id="podio">
    </div>

    <h2 id="nombre-seleccionado">Selecciona un competidor</h2>
    <div class="chart-container">
        <canvas id="miGrafica"></canvas>
    </div>

    <div class="inputs-grid" id="formulario" style="display: none;">
        <label>Producto 1 [%] <input type="number" id="p1" min="0" max="100"></label>
        <label>Producto 2 [%] <input type="number" id="p2" min="0" max="100"></label>
        <label>Producto 3 [%] <input type="number" id="p3" min="0" max="100"></label>
        <label>Producto 4 [%] <input type="number" id="p4" min="0" max="100"></label>
        <label>Producto 5 [%] <input type="number" id="p5" min="0" max="100"></label>
        <label>Producto 6 [%] <input type="number" id="p6" min="0" max="100"></label>
        <label>Producto 7 [%] <input type="number" id="p7" min="0" max="100"></label>
    </div>
    <button class="btn-guardar" id="btnGuardar" style="display: none;" onclick="guardarDatos()">Actualizar Métricas</button>
</div>

<script>
    let competidores = [];
    let seleccionadoId = null;
    let graficaPie = null;

    // 1. Arranca la página y pide los datos al Controller
    async function cargarDatos() {
        const respuesta = await fetch('/api/competidores/ranking');
        competidores = await respuesta.json();
        dibujarInterfaz();
    }

    // 2. Dibuja los botones de la izquierda y el podio de arriba
    function dibujarInterfaz() {
        const lista = document.getElementById('lista-competidores');
        const podio = document.getElementById('podio');
        lista.innerHTML = '<h2>Competidores</h2>';
        podio.innerHTML = '';

        const medallas = ['oro', 'plata', 'bronce'];
        const rangos = ['Dominando', 'Puedes mejorar', 'Perdedor'];

        competidores.forEach((c, index) => {
            // Podio superior
            podio.innerHTML += `
                <div class="podio-card ${medallas[index]}">
                    <h3>#${index + 1} ${c.nombre}</h3>
                    <p>${rangos[index]}</p>
                    <small>Progreso: ${c.promedio.toFixed(1)}%</small>
                </div>
            `;

            // Botones de la izquierda
            const btn = document.createElement('button');
            btn.className = `competidor-btn ${c.id === seleccionadoId ? 'activo' : ''}`;
            btn.innerText = c.nombre;
            btn.onclick = () => seleccionarCompetidor(c.id);
            lista.appendChild(btn);
        });
    }

    // 3. Cuando haces clic en un nombre
    function seleccionarCompetidor(id) {
        seleccionadoId = id;
        const c = competidores.find(x => x.id === id);

        document.getElementById('nombre-seleccionado').innerText = "Métricas de " + c.nombre;
        document.getElementById('formulario').style.display = 'grid';
        document.getElementById('btnGuardar').style.display = 'block';

        // Llenar inputs
        for(let i=1; i<=7; i++) document.getElementById('p'+i).value = c['p'+i];

        dibujarGrafica(c);
        dibujarInterfaz(); // Refresca colores de botones
    }

    // 4. Chart.js renderizando el pastel
    function dibujarGrafica(c) {
        const ctx = document.getElementById('miGrafica').getContext('2d');
        if (graficaPie) graficaPie.destroy(); // Borra la anterior

        graficaPie = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: ['P1', 'P2', 'P3', 'P4', 'P5', 'P6', 'P7'],
                datasets: [{
                    data: [c.p1, c.p2, c.p3, c.p4, c.p5, c.p6, c.p7],
                    backgroundColor: ['#ff6384', '#36a2eb', '#ffce56', '#4bc0c0', '#9966ff', '#ff9f40', '#c9cbcf']
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    // 5. El botón de guardar lanza el PUT al Controller
    async function guardarDatos() {
        if(!seleccionadoId) return;
        const payload = {
            p1: document.getElementById('p1').value,
            p2: document.getElementById('p2').value,
            p3: document.getElementById('p3').value,
            p4: document.getElementById('p4').value,
            p5: document.getElementById('p5').value,
            p6: document.getElementById('p6').value,
            p7: document.getElementById('p7').value
        };

        await fetch('/api/competidores/' + seleccionadoId, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        cargarDatos(); // Recarga todo al terminar
    }

    // Iniciar
    cargarDatos();
</script>
</body>
</html>
